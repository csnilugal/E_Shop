<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register - E-Shop</title>

    <link rel="stylesheet"
          href="/css/style.css">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, sans-serif;

            background: linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #312e81
    );

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;
        }

        .register-card {

            width: 100%;
            max-width: 450px;

            background: white;

            padding: 2rem;

            border-radius: 16px;

            box-shadow:
                0 10px 30px rgba(0,0,0,0.2);
        }

        .logo {

            text-align: center;

            font-size: 2rem;

            margin-bottom: 1rem;
        }

        h2 {

            text-align: center;

            margin-bottom: 0.5rem;

            color: #111827;
        }

        .subtitle {

            text-align: center;

            color: #6b7280;

            margin-bottom: 2rem;
        }

        .form-group {

            margin-bottom: 1.2rem;
        }

        label {

            display: block;

            margin-bottom: 0.5rem;

            font-weight: 600;

            color: #374151;
        }

        input,
        select {

            width: 100%;

            padding: 12px;

            border-radius: 10px;

            border: 1px solid #d1d5db;

            font-size: 15px;

            transition: 0.3s;
        }

        input:focus,
        select:focus {

            outline: none;

            border-color: #4f46e5;

            box-shadow:
                0 0 0 3px rgba(79,70,229,0.2);
        }

        .password-wrapper {

            position: relative;
        }

        .toggle-password {

            position: absolute;

            right: 12px;

            top: 50%;

            transform: translateY(-50%);

            cursor: pointer;

            color: #6b7280;

            font-size: 14px;
        }

        .role-container {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 1rem;

            margin-top: 0.5rem;
        }

        .role-card {

            border: 2px solid #ddd;

            border-radius: 12px;

            padding: 1rem;

            text-align: center;

            cursor: pointer;

            transition: 0.3s;
        }

        .role-card.active {

            border-color: #4f46e5;

            background: #ede9fe;
        }

        .role-card:hover {

            transform: translateY(-2px);
        }

        .role-card h4 {

            margin-top: 0.5rem;
        }

        .btn {

            width: 100%;

            padding: 12px;

            border: none;

            border-radius: 10px;

            background: #4f46e5;

            color: white;

            font-size: 16px;

            cursor: pointer;

            transition: 0.3s;
        }

        .btn:hover {

            background: #3730a3;
        }

        .btn:disabled {

            opacity: 0.7;
            cursor: not-allowed;
        }

        .auth-links {

            margin-top: 1.5rem;

            text-align: center;
        }

        .auth-links a {

            color: #4f46e5;

            text-decoration: none;

            font-weight: bold;
        }

        .alert {

            display: none;

            margin-bottom: 1rem;

            padding: 12px;

            border-radius: 8px;

            text-align: center;
        }

        .alert-success {

            background: #dcfce7;

            color: #166534;
        }

        .alert-error {

            background: #fee2e2;

            color: #991b1b;
        }

    </style>

</head>

<body>

<div class="register-card">

    <div class="logo">

        🛒

    </div>

    <h2>

        Create Account

    </h2>

    <p class="subtitle">

        Join E-Shop today

    </p>

    <!-- ALERT -->
    <div id="alertMsg"
         class="alert"></div>

    <!-- FORM -->
    <form id="registerForm">

        <!-- EMAIL -->
        <div class="form-group">

            <label>

                Email

            </label>

            <input type="email"
                   id="email"
                   placeholder="Enter email"
                   required>

        </div>

        <!-- PASSWORD -->
        <div class="form-group">

            <label>

                Password

            </label>

            <div class="password-wrapper">

                <input type="password"
                       id="password"
                       placeholder="Enter password"
                       required>

                <span class="toggle-password"
                      onclick="togglePassword('password', this)">

                    Show

                </span>

            </div>

        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="form-group">

            <label>

                Confirm Password

            </label>

            <div class="password-wrapper">

                <input type="password"
                       id="confirmPassword"
                       placeholder="Confirm password"
                       required>

                <span class="toggle-password"
                      onclick="togglePassword('confirmPassword', this)">

                    Show

                </span>

            </div>

        </div>

        <!-- ROLE -->
        <div class="form-group">

            <label>

                Select Account Type

            </label>

            <div class="role-container">

                <div class="role-card active"
                     onclick="selectRole('CUSTOMER', this)">

                    👤

                    <h4>

                        Customer

                    </h4>

                </div>

                <div class="role-card"
                     onclick="selectRole('OWNER', this)">

                    🏪

                    <h4>

                        Seller

                    </h4>

                </div>

            </div>

        </div>

        <input type="hidden"
               id="role"
               value="CUSTOMER">

        <!-- SUBMIT -->
        <button type="submit"
                class="btn"
                id="registerBtn">

            Create Account

        </button>

    </form>

    <!-- LOGIN LINK -->
    <div class="auth-links">

        <p>

            Already have an account?

            <a href="/login.html">

                Login

            </a>

        </p>

    </div>

</div>

<script src="/js/app.js"></script>

<script>

    // SAFE USER CHECK
    const existingUser =
        getCurrentUser();

    if (existingUser) {

        if (
            existingUser.role ===
            'OWNER'
        ) {

            window.location.href =
                '/admin.html';

        } else {

            window.location.href =
                '/products.html';
        }
    }

    // ROLE SELECTION
    function selectRole(
        role,
        element
    ) {

        document
            .querySelectorAll(
                '.role-card'
            )
            .forEach(card => {

                card.classList.remove(
                    'active'
                );
            });

        element.classList.add(
            'active'
        );

        document
            .getElementById(
                'role'
            ).value = role;
    }

    // PASSWORD TOGGLE
    function togglePassword(
        inputId,
        element
    ) {

        const input =
            document
                .getElementById(
                    inputId
                );

        if (
            input.type ===
            'password'
        ) {

            input.type = 'text';

            element.textContent =
                'Hide';

        } else {

            input.type =
                'password';

            element.textContent =
                'Show';
        }
    }

    // REGISTER
    document
        .getElementById(
            'registerForm'
        )
        .addEventListener(
            'submit',
            async (e) => {

                e.preventDefault();

                const email =
                    document
                        .getElementById(
                            'email'
                        )
                        .value;

                const password =
                    document
                        .getElementById(
                            'password'
                        )
                        .value;

                const confirmPassword =
                    document
                        .getElementById(
                            'confirmPassword'
                        )
                        .value;

                const role =
                    document
                        .getElementById(
                            'role'
                        )
                        .value;

                const registerBtn =
                    document
                        .getElementById(
                            'registerBtn'
                        );

                // PASSWORD MATCH
                if (
                    password !==
                    confirmPassword
                ) {

                    showAlert(
                        'Passwords do not match',
                        true
                    );

                    return;
                }

                try {

                    registerBtn.disabled =
                        true;

                    registerBtn.textContent =
                        'Creating Account...';

                    await apiFetch(
                        '/auth/register',
                        {
                            method:
                                'POST',

                            body:
                                JSON.stringify(
                                    {
                                        email,
                                        password,
                                        role
                                    }
                                )
                        }
                    );

                    showAlert(
                        'Registration successful!',
                        false
                    );

                    setTimeout(() => {

                        window.location.href =
                            '/login.html';

                    }, 1500);

                } catch (err) {

                    showAlert(
                        err.message,
                        true
                    );

                } finally {

                    registerBtn.disabled =
                        false;

                    registerBtn.textContent =
                        'Create Account';
                }
            }
        );

</script>

</body>

</html>
