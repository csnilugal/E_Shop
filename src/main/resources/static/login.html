<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login - E-Shop</title>

    <link rel="stylesheet"
          href="/css/style.css">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #4f46e5,
                    #7c3aed
                );

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;
        }

        .login-card {

            width: 100%;

            max-width: 420px;

            background: white;

            padding: 2rem;

            border-radius: 16px;

            box-shadow:
                0 10px 30px rgba(0,0,0,0.2);
        }

        .logo {

            text-align: center;

            font-size: 2rem;

            margin-bottom: 1rem;
        }

        h2 {

            text-align: center;

            margin-bottom: 0.5rem;

            color: #111827;
        }

        .subtitle {

            text-align: center;

            color: #6b7280;

            margin-bottom: 2rem;
        }

        .form-group {

            margin-bottom: 1.2rem;
        }

        label {

            display: block;

            margin-bottom: 0.5rem;

            font-weight: 600;

            color: #374151;
        }

        input {

            width: 100%;

            padding: 12px;

            border-radius: 10px;

            border: 1px solid #d1d5db;

            font-size: 15px;

            transition: 0.3s;
        }

        input:focus {

            outline: none;

            border-color: #4f46e5;

            box-shadow:
                0 0 0 3px rgba(79,70,229,0.2);
        }

        .password-wrapper {

            position: relative;
        }

        .toggle-password {

            position: absolute;

            right: 12px;

            top: 50%;

            transform: translateY(-50%);

            cursor: pointer;

            color: #6b7280;

            font-size: 14px;
        }

        .btn {

            width: 100%;

            padding: 12px;

            border: none;

            border-radius: 10px;

            background: #4f46e5;

            color: white;

            font-size: 16px;

            font-weight: 600;

            cursor: pointer;

            transition: 0.3s;
        }

        .btn:hover {

            background: #3730a3;
        }

        .btn:disabled {

            opacity: 0.7;

            cursor: not-allowed;
        }

        .auth-links {

            margin-top: 1.5rem;

            text-align: center;
        }

        .auth-links a {

            color: #4f46e5;

            text-decoration: none;

            font-weight: bold;
        }

        .demo-info {

            margin-top: 1rem;

            padding: 1rem;

            background: #f3f4f6;

            border-radius: 10px;

            font-size: 14px;

            color: #374151;
        }

        .alert {

            display: none;

            margin-bottom: 1rem;

            padding: 12px;

            border-radius: 8px;

            text-align: center;
        }

        .alert-success {

            background: #dcfce7;

            color: #166534;
        }

        .alert-error {

            background: #fee2e2;

            color: #991b1b;
        }

    </style>

</head>

<body>

<div class="login-card">

    <!-- LOGO -->
    <div class="logo">

        🛒

    </div>

    <!-- TITLE -->
    <h2>

        Welcome Back

    </h2>

    <p class="subtitle">

        Login to continue shopping

    </p>

    <!-- ALERT -->
    <div id="alertMsg"
         class="alert"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm">

        <!-- EMAIL -->
        <div class="form-group">

            <label>

                Email

            </label>

            <input type="email"
                   id="email"
                   placeholder="Enter email"
                   required>

        </div>

        <!-- PASSWORD -->
        <div class="form-group">

            <label>

                Password

            </label>

            <div class="password-wrapper">

                <input type="password"
                       id="password"
                       placeholder="Enter password"
                       required>

                <span class="toggle-password"
                      onclick="togglePassword()">

                    Show

                </span>

            </div>

        </div>

        <!-- SUBMIT -->
        <button type="submit"
                class="btn"
                id="loginBtn">

            Login

        </button>

    </form>

    <!-- LINKS -->
    <div class="auth-links">

        <p>

            Don't have an account?

            <a href="/register.html">

                Register

            </a>

        </p>

    </div>

    <!-- DEMO -->
    <div class="demo-info">

        <strong>Demo:</strong>
        <br><br>
        <strong>
            customer@gmail.com
        </strong>
        /
        <strong>
            password
        </strong>

    </div>

</div>

<!-- APP JS -->
<script src="/js/app.js"></script>

<script>

    // SAFE USER CHECK
    const existingUser =
        getCurrentUser();

    if (existingUser) {

        if (
            existingUser.role ===
            'OWNER'
        ) {

            window.location.href =
                '/admin.html';

        } else {

            window.location.href =
                '/products.html';
        }
    }

    // LOGIN
    document
        .getElementById(
            'loginForm'
        )
        .addEventListener(
            'submit',
            async (e) => {

                e.preventDefault();

                const email =
                    document
                        .getElementById(
                            'email'
                        )
                        .value;

                const password =
                    document
                        .getElementById(
                            'password'
                        )
                        .value;

                const loginBtn =
                    document
                        .getElementById(
                            'loginBtn'
                        );

                try {

                    loginBtn.disabled =
                        true;

                    loginBtn.textContent =
                        'Logging in...';

                    const user =
                        await apiFetch(
                            '/auth/login',
                            {
                                method:
                                    'POST',

                                body:
                                    JSON.stringify(
                                        {
                                            email,
                                            password
                                        }
                                    )
                            }
                        );

                    // SAVE USER
                    localStorage.setItem(
                        'user',
                        JSON.stringify(
                            user
                        )
                    );

                    showAlert(
                        'Login successful!',
                        false
                    );

                    setTimeout(() => {

                        if (
                            user.role ===
                            'OWNER'
                        ) {

                            window.location.href =
                                '/admin.html';

                        } else {

                            window.location.href =
                                '/products.html';
                        }

                    }, 1000);

                } catch (err) {

                    showAlert(
                        err.message,
                        true
                    );

                } finally {

                    loginBtn.disabled =
                        false;

                    loginBtn.textContent =
                        'Login';
                }
            }
        );

</script>

</body>

</html>
